name: GUI tests

on:
  push:
    paths:
      - 'nnunetv2/gui/**'
      - 'nnunetv2/tests/gui/**'
      - 'frontend/**'
      - 'pyproject.toml'
      - '.github/workflows/gui.yml'
  pull_request:
    paths:
      - 'nnunetv2/gui/**'
      - 'nnunetv2/tests/gui/**'
      - 'frontend/**'
      - 'pyproject.toml'
      - '.github/workflows/gui.yml'

jobs:
  backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Build frontend (so static-serving tests run, not skip)
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Install pinned torch (CPU)
        run: |
          python -m pip install --upgrade pip
          pip install torch==2.8.0 --index-url https://download.pytorch.org/whl/cpu

      - name: Install nnunetv2 with gui extra
        run: pip install -e ".[gui]" pytest

      - name: Run GUI backend tests
        run: pytest nnunetv2/tests/gui/ -v

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Unit tests
        working-directory: frontend
        run: npm test

      - name: Type-check
        working-directory: frontend
        run: npm run typecheck
